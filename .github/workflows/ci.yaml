---
name: Continuous integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  changes: 
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      actions: ${{ steps.filter.outputs.actions }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Paths filter
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: .github/paths-filter.yaml

  golangci-lint:
    name: Golangci-lint
    runs-on: ubuntu-latest
    needs: ["changes"]
    if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.go == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.4

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2

  go-test:
    name: Go test
    runs-on: ubuntu-latest
    needs: ["changes"]
    if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.go == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.4

      - name: Setup Libvirt
        run: |
          sudo mkdir -p /etc/systemd/system/libvirtd.socket.d/
          cat << EOF | sudo tee /etc/systemd/system/libvirtd.socket.d/10-user.conf
          [Socket]
          SocketUser=$USER
          EOF
          sudo sh -c "apt-get update && apt-get install libvirt-daemon-system"

      - name: Run go tests
        run: go test ./...

  code-scanning:
    name: Code scanning
    uses: ./.github/workflows/code-scanning.yaml
    needs: ["changes"]
    permissions:
      security-events: write
    with:
      go: ${{ needs.changes.outputs.go == 'true' }}
      actions: ${{ needs.changes.outputs.actions == 'true' }}

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    needs: ["changes"]
    if: ${{ github.event_name == 'pull_request' && (needs.changes.outputs.go == 'true' || needs.changes.outputs.actions == 'true') }}
    permissions:
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Review dependencies
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          comment-summary-in-pr: always

  required-commit-statuses:
    name: Set required commit statuses
    runs-on: ubuntu-latest
    needs: ["changes"]
    if: ${{ github.event_name == 'pull_request' && !(needs.changes.outputs.go && needs.changes.outputs.actions && needs.changes.outputs.renovate-config) }}
    permissions:
      statuses: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set Renovate config validation commit status
        if: ${{ github.head_ref != 'renovate/reconfigure' }}
        uses: ./.github/actions/commit-status
        with:
          context: Renovate config validation
          state: ${{ (needs.changes.outputs.renovate-config == 'true' && !startsWith(github.head_ref, 'renovate/') ) && 'failure' || 'success' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set CodeQL commit status
        if: ${{ !(needs.changes.outputs.go || needs.changes.outputs.actions) }}
        uses: ./.github/actions/commit-status
        with:
          context: CodeQL
          state: success
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set osv-scanner commit status
        if: ${{ !needs.changes.outputs.go }}
        uses: ./.github/actions/commit-status
        with:
          context: osv-scanner
          state: success
          token: ${{ secrets.GITHUB_TOKEN }}
