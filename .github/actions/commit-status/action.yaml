---
name: Commit status
description: Set a commit status
inputs:
  context:
    description: Desired context
    required: true
  state:
    description: Desired state
    required: true
  token:
    description: GitHub token
    required: true
runs:
  using: "composite"
  steps:
    - name: Set Greeting
      run: |
        curl -L \
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ inputs.token }}" \
          -H "X-GitHub-Api-Version: 2026-03-10" \
          ${{ github.api_url }}/repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
          -d '{"state":"${{ inputs.state }}","context":"${{ inputs.context }}"}'
      shell: bash
  